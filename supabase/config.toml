project_id = "kochbuch"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.dev.sql"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:4173"
additional_redirect_urls = ["http://127.0.0.1:4173", "http://localhost:4173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
double_confirm_changes = true
secure_password_change = true
otp_length = 6
otp_expiry = 3600

[storage]
enabled = true
file_size_limit = "20MiB"

[realtime]
enabled = true

[analytics]
enabled = false
